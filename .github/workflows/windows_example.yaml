name: WindowsExample

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

defaults:
  run:
    shell: powershell

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        library_type: [shared, static]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - run: pip install cmake ninja meson

      - name: vcpkg build
        uses: johnwason/vcpkg-action@v7
        id: vcpkg
        with:
          pkgs: pkgconf libevent openssl curl[openssl] brotli zstd date
          triplet: x64-windows-release
          token: ${{ github.token }}

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        env:
          PKG_CONFIG: ${{ github.workspace }}/vcpkg/installed/x64-windows-release/tools/pkgconf/pkgconf.exe
          PKG_CONFIG_PATH: ${{ github.workspace }}/vcpkg/installed/x64-windows-release/lib/pkgconfig
        run: >
          meson setup build
          -DPISTACHE_BUILD_TESTS=false
          -DPISTACHE_DEBUG=false
          -DPISTACHE_USE_SSL=true
          -DPISTACHE_BUILD_EXAMPLES=true
          -DPISTACHE_BUILD_DOCS=false
          -DPISTACHE_USE_CONTENT_ENCODING_DEFLATE=true
          -DPISTACHE_USE_CONTENT_ENCODING_BROTLI=true
          -DPISTACHE_USE_CONTENT_ENCODING_ZSTD=true
          --buildtype=release
          -Db_coverage=false
          -Db_sanitize=none
          -Db_lundef=false
          --default-library=${{ matrix.library_type }}
          --prefix="$env:ProgramFiles\pistache_distribution"

      - name: Build
        run: meson compile -C build

      - name: Install
        run: meson install -C build

      - name: Smoke-test example
        run: |
          $installDir = "$env:ProgramFiles\pistache_distribution"
          $vcpkgBin   = "${{ github.workspace }}/vcpkg/installed/x64-windows-release/bin"
          $libType    = "${{ matrix.library_type }}"

          if ($libType -eq 'shared') {
            $dll = Get-Item "$installDir\bin\pistache*.dll" -ErrorAction SilentlyContinue
            if (! $dll) { throw "pistache*.dll not found in $installDir\bin" }
            Write-Host "Found DLL(s): $($dll.Name)"
          } else {
            $lib = Get-Item "$installDir\lib\pistache*.lib" -ErrorAction SilentlyContinue
            if (! $lib) { throw "pistache*.lib not found in $installDir\lib" }
            Write-Host "Found static lib(s): $($lib.Name)"
          }
          if (! (Test-Path "$installDir\include\pistache\endpoint.h")) { throw "headers not installed" }

          # For shared builds put installed bin first so the versioned DLL is found
          if ($libType -eq 'shared') {
            $env:Path = "$installDir\bin;$vcpkgBin;$env:Path"
          } else {
            $env:Path = "$vcpkgBin;$env:Path"
          }

          $exePath = Get-ChildItem -Recurse -Path build -Filter "runhello_server.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (! $exePath) { throw "runhello_server.exe not found under build\" }
          Write-Host "Using exe: $exePath"

          # Capture stdout/stderr so we can diagnose startup failures
          $stdoutLog = "hello_server_stdout.txt"
          $stderrLog = "hello_server_stderr.txt"
          $proc = Start-Process -FilePath $exePath -PassThru `
                    -RedirectStandardOutput $stdoutLog `
                    -RedirectStandardError  $stderrLog

          # Wait up to 30s for the server to start accepting connections
          $ready = $false
          for ($i = 0; $i -lt 30; $i++) {
            if ($proc.HasExited) { break }
            try {
              $conn = [System.Net.Sockets.TcpClient]::new()
              $conn.Connect('127.0.0.1', 9080)
              $conn.Close()
              $ready = $true
              break
            } catch {
              Start-Sleep -Seconds 1
            }
          }

          # Check the process is still alive and port is open
          if ($proc.HasExited -or -not $ready) {
            Write-Host "=== stdout ==="
            Get-Content $stdoutLog -ErrorAction SilentlyContinue
            Write-Host "=== stderr ==="
            Get-Content $stderrLog -ErrorAction SilentlyContinue
            $exitCode = $proc.ExitCode
            $ucode = [System.BitConverter]::ToUInt32([System.BitConverter]::GetBytes($exitCode), 0)
            $msg = "Server process exited prematurely or port 9080 not ready (exit code $exitCode / 0x$($ucode.ToString('X8')))."
            if ($ucode.ToString('X8') -eq 'C0000135') {
              $msg += " STATUS_DLL_NOT_FOUND: a required DLL could not be located."
            }
            throw $msg
          }
          Write-Host "Server process running (PID $($proc.Id))"

          try {
            $resp = Invoke-WebRequest -Uri http://localhost:9080 -UseBasicParsing -TimeoutSec 5
            Write-Host "Response ($($resp.StatusCode)): $($resp.Content)"
            if ($resp.StatusCode -ne 200) { throw "Unexpected status: $($resp.StatusCode)" }
            Write-Host "Smoke test passed"
          } finally {
            Stop-Process -Id $proc.Id -ErrorAction SilentlyContinue
            Write-Host "=== server stdout ==="; Get-Content $stdoutLog -ErrorAction SilentlyContinue
            Write-Host "=== server stderr ==="; Get-Content $stderrLog -ErrorAction SilentlyContinue
          }
